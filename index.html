<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Application Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <h1 class="title">Job Application Tracker</h1>

    <!-- Stats -->
    <div class="stats">
        <div class="stat-card">
            <p>Available</p>
            <h2 id="availableCount">0</h2>
        </div>
        <div class="stat-card">
            <p>Interview</p>
            <h2 id="interviewCount" class="green">0</h2>
        </div>
        <div class="stat-card">
            <p>Rejected</p>
            <h2 id="rejectedCount" class="red">0</h2>
        </div>
    </div>

    <!-- Header -->
    <div class="jobs-header">
        <h2>Available Jobs</h2>
        <span class="job-count" id="jobCountText">0 of 0 jobs</span>
    </div>

    <!-- Filters -->
    <div class="filters">
        <button class="active" data-filter="all">All</button>
        <button data-filter="interview">Interview</button>
        <button data-filter="rejected">Rejected</button>
    </div>

    <!-- Jobs Container -->
    <div class="jobs-container"></div>

</div>

<script src="script.js"></script>
</body>
</html>
